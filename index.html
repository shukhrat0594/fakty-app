<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Факты</title>
<style>
  :root {
    --bg: #ffffff; --card: #ffffff; --ink: #16181d; --muted: #6b7280;
    --accent: #2563eb; --accent-ink: #ffffff; --chip: #eaf1ff; --chip-on: #2563eb;
    --border: #e2e5ea; --good: #16a34a; --bad: #e5484d; --shadow: 0 2px 10px rgba(37,99,235,.10);
  }
  :root[data-theme="dark"] {
    --bg: #12151a; --card: #1a1e24; --ink: #eef1f5; --muted: #9aa2ad;
    --accent: #4f8bff; --accent-ink: #ffffff; --chip: #1e2733; --chip-on: #4f8bff;
    --border: #2a2f38; --shadow: 0 2px 10px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #12151a; --card: #1a1e24; --ink: #eef1f5; --muted: #9aa2ad;
      --accent: #4f8bff; --accent-ink: #ffffff; --chip: #1e2733; --chip-on: #4f8bff;
      --border: #2a2f38; --shadow: 0 2px 10px rgba(0,0,0,.35);
    }
  }
  .theme-btn {
    border: 1px solid var(--border); background: var(--card); color: var(--ink);
    border-radius: 10px; width: 34px; height: 34px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font: 16px/1.55 system-ui, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh; padding-bottom: 40px;
  }
  header {
    display: flex; align-items: center; gap: 8px; flex-wrap: nowrap;
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 5;
  }
  h1 { font-size: 17px; margin-right: auto; white-space: nowrap; }
  .seg { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; flex-shrink: 0; }
  .seg button {
    border: 0; background: transparent; color: var(--ink);
    padding: 7px 10px; cursor: pointer; font-size: 13px; white-space: nowrap;
  }
  @media (max-width: 420px) {
    h1 { display: none; }
    .seg button { padding: 7px 9px; font-size: 12.5px; }
    header { justify-content: space-between; }
  }
  .seg button.on { background: var(--accent); color: var(--accent-ink); }
  main { max-width: 860px; margin: 0 auto; padding: 16px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 18px; }
  .chip {
    background: var(--chip); border: 1px solid var(--border); color: var(--ink);
    border-radius: 999px; padding: 5px 13px; font-size: 13px; cursor: pointer;
  }
  .chip.on { background: var(--chip-on); color: var(--accent-ink); border-color: var(--chip-on); }
  .chip small { opacity: .65; margin-left: 4px; }

  /* Flashcard */
  .fc-wrap { perspective: 1400px; overflow: visible; }
  .fc {
    position: relative; display: grid; grid-template-areas: "stack";
    cursor: pointer; transform-style: preserve-3d;
    transition: transform .6s cubic-bezier(.34,1.4,.44,1); /* пружинный переворот */
    touch-action: pan-y; user-select: none; -webkit-user-select: none;
  }
  .fc.flip { transform: rotateY(180deg); }
  /* вылет старой карточки при свайпе */
  .fc.slide-left  { transform: translateX(-130%) rotate(-10deg) scale(.9); opacity: 0;
                    transition: transform .3s cubic-bezier(.5,0,.9,.5), opacity .28s; }
  .fc.slide-right { transform: translateX(130%) rotate(10deg) scale(.9); opacity: 0;
                    transition: transform .3s cubic-bezier(.5,0,.9,.5), opacity .28s; }
  .fc.flip.slide-left  { transform: rotateY(180deg) translateX(130%) rotate(10deg) scale(.9); }
  .fc.flip.slide-right { transform: rotateY(180deg) translateX(-130%) rotate(-10deg) scale(.9); }
  /* прилёт новой карточки */
  @keyframes fc-in-left {
    from { transform: translateX(60%) rotate(6deg) scale(.92); opacity: 0; }
    60%  { transform: translateX(-2%) rotate(-.5deg) scale(1.01); opacity: 1; }
    to   { transform: translateX(0) rotate(0) scale(1); opacity: 1; }
  }
  @keyframes fc-in-right {
    from { transform: translateX(-60%) rotate(-6deg) scale(.92); opacity: 0; }
    60%  { transform: translateX(2%) rotate(.5deg) scale(1.01); opacity: 1; }
    to   { transform: translateX(0) rotate(0) scale(1); opacity: 1; }
  }
  .fc.enter-left  { animation: fc-in-left .38s cubic-bezier(.22,1,.36,1); }
  .fc.enter-right { animation: fc-in-right .38s cubic-bezier(.22,1,.36,1); }
  .face {
    position: relative; grid-area: stack; min-height: 300px; max-height: 70vh;
    backface-visibility: hidden;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    box-shadow: var(--shadow); padding: 28px; overflow-y: auto;
    display: flex; flex-direction: column; justify-content: center; text-align: center;
  }
  .face.back { transform: rotateY(180deg); text-align: left; justify-content: flex-start; }
  .face .cat { position: absolute; top: 12px; left: 16px; font-size: 12px; color: var(--muted); }
  .face .hint { position: absolute; bottom: 10px; right: 16px; font-size: 12px; color: var(--muted); }
  .front-text { font-size: 24px; font-weight: 600; }
  .back .note { margin-top: 14px; font-size: 14px; color: var(--muted); }
  .ru-mark { font-size: 11px; color: var(--muted); border: 1px solid var(--border);
             border-radius: 6px; padding: 0 5px; margin-left: 6px; vertical-align: 2px; }
  .fc-nav { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
  .btn {
    background: var(--card); color: var(--ink); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 18px; font-size: 15px; cursor: pointer;
  }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .counter { text-align: center; color: var(--muted); font-size: 13px; margin-top: 10px; }

  /* List */
  .search {
    width: 100%; padding: 10px 14px; font-size: 15px; margin-bottom: 14px;
    border: 1px solid var(--border); border-radius: 10px; background: var(--card); color: var(--ink);
  }
  .item {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--shadow);
  }
  .item .cat { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .item b { font-weight: 600; }
  .item .note { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .more { display: block; margin: 14px auto; }

  /* Quiz */
  .q-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    box-shadow: var(--shadow); padding: 24px;
  }
  .q-text { font-size: 19px; font-weight: 600; margin-bottom: 18px; }
  .opts { display: grid; gap: 10px; }
  .opt {
    text-align: left; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; font-size: 15px; cursor: pointer; color: var(--ink);
  }
  .opt:hover { border-color: var(--accent); }
  .opt.correct { border-color: var(--good); background: color-mix(in srgb, var(--good) 14%, var(--bg)); }
  .opt.wrong { border-color: var(--bad); background: color-mix(in srgb, var(--bad) 14%, var(--bg)); }
  .opt:disabled { cursor: default; }
  .q-note { margin-top: 14px; font-size: 14px; color: var(--muted); }
  .scorebar { display: flex; gap: 18px; margin-bottom: 14px; color: var(--muted); font-size: 14px; }
  .scorebar b { color: var(--ink); }
</style>
</head>
<body>
<header>
  <h1 id="title">Факты</h1>
  <div class="seg" id="modeSeg"></div>
  <button class="theme-btn" id="langBtn" title="Til / Язык"></button>
  <button class="theme-btn" id="themeBtn" title="Тёмная/светлая тема"></button>
</header>
<main>
  <div class="chips" id="chips"></div>
  <div id="view"></div>
</main>

<script src="data.js"></script>
<script src="uz.js"></script>
<script>
(function () {
  const saved = localStorage.getItem('fakty-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();
function currentTheme() {
  const attr = document.documentElement.getAttribute('data-theme');
  if (attr) return attr;
  return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function renderThemeBtn() {
  const btn = document.getElementById('themeBtn');
  const isDark = currentTheme() === 'dark';
  btn.textContent = isDark ? '☀️' : '🌙';
  btn.onclick = () => {
    const next = currentTheme() === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('fakty-theme', next);
    renderThemeBtn();
  };
}
renderThemeBtn();

// langBtn инициализируется ниже, после объявления I18N/renderLangBtn

const I18N = {
  ru: {
    title: 'Факты', cards: 'Карточки', list: 'Список', quiz: 'Викторина',
    all: 'Все', flip: 'ответ — нажмите', next: 'Дальше →', prev: '← Назад',
    search: 'Поиск…', more: 'Показать ещё',
    correct: 'Верно', wrong: 'Ошибок', streak: 'Подряд', nextQ: 'Следующий вопрос →',
    empty: 'Ничего не найдено',
  },
  uz: {
    title: 'Faktlar', cards: 'Kartochkalar', list: 'Roʻyxat', quiz: 'Viktorina',
    all: 'Hammasi', flip: 'javob — bosing', next: 'Keyingi →', prev: '← Oldingi',
    search: 'Qidiruv…', more: 'Yana koʻrsatish',
    correct: 'Toʻgʻri', wrong: 'Xato', streak: 'Ketma-ket', nextQ: 'Keyingi savol →',
    empty: 'Hech narsa topilmadi',
  }
};
const CATS_UZ = {
  'Рандом': 'Aralash', 'История': 'Tarix', 'Литература': 'Adabiyot',
  'Цитаты': 'Iqtiboslar', 'Науки': 'Fanlar', 'Шекспир': 'Shekspir',
  'Греки': 'Yunonlar', 'Христианство': 'Xristianlik', 'Искусство': 'Sanʼat',
  'Спорт': 'Sport', 'Перифразы': 'Perifrazalar', 'Прототипы': 'Prototiplar',
  'Псевдонимы': 'Taxalluslar', 'Имена разных стран': 'Turli mamlakat ismlari',
  'Олимпийские игры': 'Olimpiya oʻyinlari', 'Нобелевские лауреаты': 'Nobel laureatlari',
  'Латинские выражения': 'Lotin iboralari'
};

let lang = localStorage.getItem('fakty-lang') || 'ru';
let T = I18N[lang];
let mode = localStorage.getItem('fakty-mode') || 'cards';
let cat = 'all';
const catName = c => lang === 'uz' ? (CATS_UZ[c] || c) : c;

function renderLangBtn() {
  const btn = document.getElementById('langBtn');
  btn.textContent = lang === 'uz' ? 'RU' : 'UZ';
  btn.onclick = () => {
    lang = lang === 'uz' ? 'ru' : 'uz';
    T = I18N[lang];
    localStorage.setItem('fakty-lang', lang);
    document.getElementById('title').textContent = T.title;
    renderLangBtn();
    render();
  };
}

// --- Единый список записей для карточек/списка/викторины
// each: {front, back, note, hasUz}
function localize(rec) {
  const uz = (typeof UZ !== 'undefined' && UZ[rec.id]) || null;
  if (rec.q !== undefined) { // pair
    if (lang === 'uz' && uz) {
      return { front: uz.q || rec.q, back: uz.a || rec.a, note: uz.n || rec.note, hasUz: true };
    }
    return { front: rec.q, back: rec.a, note: rec.note, hasUz: lang !== 'uz' || !!uz };
  }
  // fact
  if (rec.term) {
    if (lang === 'uz' && uz && uz.d) {
      return { front: rec.term, back: uz.d, note: null, hasUz: true };
    }
    return { front: rec.term, back: rec.def, note: null, hasUz: lang !== 'uz' };
  }
  if (lang === 'uz' && uz && uz.t) {
    return { front: null, back: uz.t, note: null, hasUz: true };
  }
  return { front: null, back: rec.text, note: null, hasUz: lang !== 'uz' };
}
const ruMark = loc => loc.hasUz ? '' : ' <span class="ru-mark">RU</span>';
const ALL = [...DATA.pairs, ...DATA.facts];
const cats = [...new Set(ALL.map(r => r.cat))];

function filtered() {
  return ALL.filter(r => cat === 'all' || r.cat === cat);
}
function cardable() { // для флешкарт и викторины нужен front
  return filtered().filter(r => r.q !== undefined || r.term);
}
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------- header / chips ----------
function renderHeader() {
  const seg = document.getElementById('modeSeg');
  seg.innerHTML = ['cards', 'list', 'quiz']
    .map(m => `<button data-mode="${m}" class="${m === mode ? 'on' : ''}">${T[m]}</button>`).join('');
  seg.querySelectorAll('button').forEach(b => b.onclick = () => {
    mode = b.dataset.mode; localStorage.setItem('fakty-mode', mode); render();
  });
}
function renderChips() {
  const el = document.getElementById('chips');
  const counts = {};
  ALL.forEach(r => counts[r.cat] = (counts[r.cat] || 0) + 1);
  el.innerHTML =
    `<button class="chip ${cat === 'all' ? 'on' : ''}" data-c="all">${T.all}<small>${ALL.length}</small></button>` +
    cats.map(c =>
      `<button class="chip ${cat === c ? 'on' : ''}" data-c="${esc(c)}">${esc(catName(c))}<small>${counts[c]}</small></button>`
    ).join('');
  el.querySelectorAll('.chip').forEach(b => b.onclick = () => { cat = b.dataset.c; render(); });
}

// ---------- flashcards ----------
let deck = [], deckPos = 0, deckKey = '', enterDir = '';
function renderCards() {
  const v = document.getElementById('view');
  const key = cat;
  if (deckKey !== key || !deck.length) { deck = shuffle(cardable()); deckPos = 0; deckKey = key; }
  if (!deck.length) { v.innerHTML = `<p>${T.empty}</p>`; return; }
  const rec = deck[deckPos], loc = localize(rec);
  const enterCls = enterDir ? ' enter-' + enterDir : '';
  enterDir = '';
  v.innerHTML = `
    <div class="fc-wrap"><div class="fc${enterCls}" id="fc">
      <div class="face front">
        <div class="cat">${esc(catName(rec.cat))}</div>
        <div class="front-text">${esc(loc.front)}</div>
        <div class="hint">${T.flip}</div>
      </div>
      <div class="face back">
        <div class="cat">${esc(catName(rec.cat))}</div>
        <div style="margin-top:18px"><b>${esc(loc.front)}</b>${ruMark(loc)}</div>
        <div style="margin-top:8px">${esc(loc.back)}</div>
        ${loc.note ? `<div class="note">${esc(loc.note)}</div>` : ''}
      </div>
    </div></div>
    <div class="fc-nav">
      <button class="btn" id="prev">${T.prev}</button>
      <button class="btn primary" id="next">${T.next}</button>
    </div>
    <div class="counter">${deckPos + 1} / ${deck.length}</div>`;
  const fcEl = document.getElementById('fc');
  let animating = false;
  function goTo(step) {
    if (animating) return;
    animating = true;
    fcEl.classList.add(step > 0 ? 'slide-left' : 'slide-right');
    setTimeout(() => {
      deckPos = (deckPos + step + deck.length) % deck.length;
      enterDir = step > 0 ? 'left' : 'right';
      renderCards();
    }, 280);
  }
  // кнопки: без переворота, просто следующая/предыдущая со slide-анимацией
  document.getElementById('next').onclick = () => goTo(1);
  document.getElementById('prev').onclick = () => goTo(-1);
  // тап по карточке — переворот
  let swiped = false;
  fcEl.addEventListener('click', () => {
    if (swiped) { swiped = false; return; }
    if (!animating) fcEl.classList.toggle('flip');
  });
  // свайп: touch-события (телефон) + pointer для мыши
  let sx = 0, sy = 0;
  const trySwipe = (dx, dy) => {
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) { goTo(dx < 0 ? 1 : -1); return true; }
    return false;
  };
  fcEl.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
  fcEl.addEventListener('touchend', e => {
    const t = e.changedTouches[0];
    swiped = trySwipe(t.clientX - sx, t.clientY - sy);
  }, { passive: true });
  fcEl.addEventListener('pointerdown', e => { if (e.pointerType === 'mouse') { sx = e.clientX; sy = e.clientY; } });
  fcEl.addEventListener('pointerup', e => { if (e.pointerType === 'mouse') { swiped = trySwipe(e.clientX - sx, e.clientY - sy); } });
  // на десктопе — стрелки клавиатуры
  document.onkeydown = e => {
    if (mode !== 'cards') return;
    if (e.key === 'ArrowRight') goTo(1);
    else if (e.key === 'ArrowLeft') goTo(-1);
    else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (!animating) fcEl.classList.toggle('flip'); }
  };
}

// ---------- list ----------
let listLimit = 50, query = '';
function renderList() {
  const v = document.getElementById('view');
  v.innerHTML = `<input class="search" id="q" placeholder="${T.search}" value="${esc(query)}">
                 <div id="items"></div>`;
  const inp = document.getElementById('q');
  inp.oninput = () => { query = inp.value; listLimit = 50; drawItems(); };
  drawItems();
  function drawItems() {
    const ql = query.trim().toLowerCase();
    const rows = filtered().map(r => ({ r, loc: localize(r) }))
      .filter(({ r, loc }) => !ql ||
        [loc.front, loc.back, loc.note, r.text, r.q, r.a].some(s => s && String(s).toLowerCase().includes(ql)));
    const slice = rows.slice(0, listLimit);
    document.getElementById('items').innerHTML =
      (slice.map(({ r, loc }) => `
        <div class="item">
          <div class="cat">${esc(catName(r.cat))}</div>
          ${loc.front ? `<b>${esc(loc.front)}</b>${ruMark(loc)} — ` : ''}${esc(loc.back)}${loc.front ? '' : ruMark(loc)}
          ${loc.note ? `<div class="note">${esc(loc.note)}</div>` : ''}
        </div>`).join('') || `<p>${T.empty}</p>`) +
      (rows.length > listLimit ? `<button class="btn more" id="more">${T.more} (${rows.length - listLimit})</button>` : '');
    const more = document.getElementById('more');
    if (more) more.onclick = () => { listLimit += 50; drawItems(); };
  }
}

// ---------- quiz ----------
let score = { ok: 0, bad: 0, streak: 0 };
function renderQuiz() {
  const v = document.getElementById('view');
  const pool = cardable();
  if (pool.length < 4) { v.innerHTML = `<p>${T.empty}</p>`; return; }
  const rec = pool[Math.floor(Math.random() * pool.length)];
  const loc = localize(rec);
  const sameCat = pool.filter(r => r.cat === rec.cat && r.id !== rec.id);
  const others = shuffle(sameCat.length >= 3 ? sameCat : pool.filter(r => r.id !== rec.id)).slice(0, 3);
  const opts = shuffle([{ rec, loc, ok: true }, ...others.map(r => ({ rec: r, loc: localize(r), ok: false }))]);
  v.innerHTML = `
    <div class="scorebar">
      <span>✅ ${T.correct}: <b>${score.ok}</b></span>
      <span>❌ ${T.wrong}: <b>${score.bad}</b></span>
      <span>🔥 ${T.streak}: <b>${score.streak}</b></span>
    </div>
    <div class="q-card">
      <div class="cat" style="font-size:12px;color:var(--muted);margin-bottom:6px">${esc(catName(rec.cat))}</div>
      <div class="q-text">${esc(loc.front)}${ruMark(loc)}</div>
      <div class="opts">${opts.map((o, i) =>
        `<button class="opt" data-i="${i}">${esc(o.loc.back)}</button>`).join('')}</div>
      <div class="q-note" id="qnote"></div>
    </div>`;
  const btns = [...v.querySelectorAll('.opt')];
  btns.forEach((b, i) => b.onclick = () => {
    btns.forEach(x => x.disabled = true);
    const chosen = opts[i];
    btns[opts.findIndex(o => o.ok)].classList.add('correct');
    if (chosen.ok) { score.ok++; score.streak++; }
    else { score.bad++; score.streak = 0; b.classList.add('wrong'); }
    const note = loc.note ? esc(loc.note) + '<br>' : '';
    document.getElementById('qnote').innerHTML =
      note + `<button class="btn primary" style="margin-top:10px" id="nq">${T.nextQ}</button>`;
    document.getElementById('nq').onclick = renderQuiz;
  });
}

function render() {
  renderHeader(); renderChips();
  ({ cards: renderCards, list: renderList, quiz: renderQuiz })[mode]();
}
renderLangBtn();
document.getElementById('title').textContent = T.title;
render();
</script>
</body>
</html>
