name: Send hourly fact

on:
  schedule:
    # 09:00-21:00 по Ташкенту (UTC+5) => 04:00-16:00 UTC, каждый час
    # минута смещена от :00, т.к. в пиковую минуту каждого часа GitHub Actions
    # может полностью пропускать запуск задачи (а не просто задерживать)
    - cron: '7 4-16 * * *'
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send random fact to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/send_fact.py
